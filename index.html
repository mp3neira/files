<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalhes do Veículo — Garagem Yale</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c8a96e;
    --gold-light: #e2c99a;
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: rgba(200,169,110,0.15);
    --text: #f0ece4;
    --muted: #6b6560;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,169,110,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,169,110,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  /* Nav */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,13,13,0.9);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .nav-back {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.2s, background 0.2s;
  }
  .nav-back:hover { border-color: var(--gold); background: rgba(200,169,110,0.08); }

  .nav-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.04em;
    text-decoration: none;
  }

  .nav-brand span { color: var(--text); font-weight: 400; }

  /* Layout */
  .page {
    max-width: 1000px;
    margin: 0 auto;
    padding: 56px 40px 80px;
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 40px;
    align-items: start;
  }

  /* Left column */
  .gallery {
    position: sticky;
    top: 80px;
  }

  .main-img {
    width: 100%;
    height: 380px;
    object-fit: cover;
    border-radius: var(--radius);
    display: block;
    background: var(--surface2);
  }

  .no-img {
    width: 100%;
    height: 380px;
    background: var(--surface2);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
  }

  .badge-row {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .badge {
    padding: 6px 14px;
    border-radius: 99px;
    border: 1px solid var(--border);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Right column */
  .info {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
    opacity: 0.8;
  }

  .title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(32px, 4vw, 48px);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 15px;
    color: var(--muted);
    font-weight: 300;
    margin-bottom: 28px;
  }

  .price-block {
    padding: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    position: relative;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .price-block::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .price-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 44px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  /* Specs */
  .specs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 24px;
  }

  .spec {
    background: var(--surface);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .spec-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .spec-value {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }

  /* Desc */
  .desc-text {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.7;
    font-weight: 300;
    margin-bottom: 28px;
    padding: 20px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    display: none;
  }

  .desc-text.visible { display: block; }

  /* Buttons */
  .btn-wa {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 16px 24px;
    background: #25D366;
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, transform 0.15s;
    margin-bottom: 12px;
  }

  .btn-wa:hover { background: #1fba59; transform: translateY(-1px); }

  .btn-back {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 14px 24px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s;
  }

  .btn-back:hover { border-color: var(--gold); color: var(--gold); }

  /* Error */
  .error-page {
    min-height: 80vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
  }

  .error-page h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 40px;
    margin-bottom: 12px;
    color: var(--muted);
  }

  @media (max-width: 768px) {
    .page {
      grid-template-columns: 1fr;
      padding: 32px 20px 60px;
    }
    .gallery { position: static; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-back" href="garagem.html" title="Voltar">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
  </a>
  <a class="nav-brand" href="garagem.html">Garagem <span>Yale</span></a>
</nav>

<div id="root"></div>

<script>
const carros = JSON.parse(localStorage.getItem("cars")) || [];
const index  = parseInt(localStorage.getItem("carroSelecionado") || "0", 10);
const c      = carros[index];
const root   = document.getElementById("root");

if (!c) {
  root.innerHTML = `
    <div class="error-page">
      <h2>Veículo não encontrado</h2>
      <p style="color:var(--muted);margin-bottom:24px">Este veículo pode não estar mais disponível.</p>
      <a class="btn-back" href="garagem.html" style="max-width:200px">Ver estoque</a>
    </div>`;
} else {
  const waMsg = encodeURIComponent(`Olá! Tenho interesse no ${c.marca} ${c.modelo} ${c.ano}. Poderia me passar mais informações?`);
  const hasDesc = c.desc && c.desc.trim().length > 0;

  root.innerHTML = `
    <div class="page">
      <!-- Left: gallery -->
      <div class="gallery">
        ${c.foto
          ? `<img class="main-img" id="img" src="${c.foto}" alt="${c.marca} ${c.modelo}">`
          : `<div class="no-img">
               <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1">
                 <rect x="2" y="7" width="20" height="13" rx="2"/>
                 <path d="M16 7l-2-4H10L8 7"/>
               </svg>
             </div>`
        }
        <div class="badge-row">
          ${c.combustivel ? `<div class="badge">${c.combustivel}</div>` : ""}
          ${c.cambio      ? `<div class="badge">${c.cambio}</div>`      : ""}
        </div>
      </div>

      <!-- Right: info -->
      <div class="info">
        <div class="eyebrow">${c.marca}</div>
        <h1 class="title">${c.modelo}</h1>
        <p class="subtitle">${c.ano || ""}${c.cor ? " · " + c.cor : ""}</p>

        <div class="price-block">
          <div class="price-label">Preço</div>
          <div class="price">${c.preco || "Consulte"}</div>
        </div>

        <div class="specs">
          <div class="spec">
            <div class="spec-label">Ano</div>
            <div class="spec-value">${c.ano || "—"}</div>
          </div>
          <div class="spec">
            <div class="spec-label">Quilometragem</div>
            <div class="spec-value">${c.km || "—"}</div>
          </div>
          <div class="spec">
            <div class="spec-label">Cor</div>
            <div class="spec-value">${c.cor || "—"}</div>
          </div>
          <div class="spec">
            <div class="spec-label">Câmbio</div>
            <div class="spec-value">${c.cambio || "—"}</div>
          </div>
          <div class="spec">
            <div class="spec-label">Combustível</div>
            <div class="spec-value">${c.combustivel || "—"}</div>
          </div>
          <div class="spec">
            <div class="spec-label">Marca</div>
            <div class="spec-value">${c.marca || "—"}</div>
          </div>
        </div>

        ${hasDesc ? `<div class="desc-text visible">${c.desc}</div>` : ""}

        <a class="btn-wa" href="https://api.whatsapp.com/send/?phone=5547999064574&text=${waMsg}&type=phone_number&app_absent=0" target="_blank">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
          </svg>
          Falar no WhatsApp
        </a>

        <a class="btn-back" href="garagem.html">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
          </svg>
          Ver todos os veículos
        </a>
      </div>
    </div>`;
}
</script>
</body>
</html>
